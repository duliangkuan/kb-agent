<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 770">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;family=Noto+Sans+SC:wght@400;500;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
      .t  { fill:#fff; font-weight:600; }
      .s  { fill:#94a3b8; font-weight:400; }
      .lbl{ fill:#cbd5e1; font-weight:500; }
    </style>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker>
    <marker id="ac" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#22d3ee"/></marker>
    <marker id="aco" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polyline points="0 0,10 3.5,0 7" fill="none" stroke="#22d3ee" stroke-width="1.5"/></marker>
    <marker id="ao" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#fb923c"/></marker>
    <marker id="am" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#fbbf24"/></marker>
    <marker id="av" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#a78bfa"/></marker>
    <marker id="ab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#D97757"/></marker>
  </defs>

  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="30" y="30" class="t" font-size="17">知识库 Agent · 系统架构</text>
  <text x="30" y="50" class="s" font-size="10">语义检索 + 流式 RAG + MCP 工具　|　核心亮点：HTTP 接口与 MCP 工具共享同一检索内核</text>
  <rect x="30" y="56" width="300" height="2.5" fill="#D97757"/>

  <!-- ===== Region boundaries (drawn first) ===== -->
  <rect x="45" y="68" width="950" height="108" rx="12" fill="none" stroke="#22d3ee" stroke-width="1" stroke-dasharray="10,4"/>
  <text x="58" y="85" fill="#22d3ee" font-size="10" font-weight="600">客户端层</text>
  <rect x="45" y="206" width="950" height="126" rx="12" fill="none" stroke="#34d399" stroke-width="1" stroke-dasharray="10,4"/>
  <text x="58" y="223" fill="#34d399" font-size="10" font-weight="600">服务层 · 双入口（共享同一检索内核）</text>

  <!-- ===== Arrows ===== -->
  <!-- 浏览器 -> FastAPI (HTTP) -->
  <path d="M255,158 L255,240" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#ac)"/>
  <text x="248" y="200" class="lbl" font-size="8" text-anchor="end">HTTP</text>
  <!-- FastAPI -> 浏览器 (SSE return) -->
  <path d="M305,240 L305,160" fill="none" stroke="#22d3ee" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#aco)"/>
  <text x="312" y="200" fill="#22d3ee" font-size="8">SSE 流式</text>
  <!-- Agent -> mcp (MCP/stdio) -->
  <path d="M770,158 L770,240" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#ac)"/>
  <text x="778" y="200" class="lbl" font-size="8">MCP / stdio</text>
  <!-- FastAPI -> retriever -->
  <path d="M275,320 L275,360 L430,360 L430,392" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="300" y="352" class="lbl" font-size="8">调用</text>
  <!-- mcp -> retriever (shared kernel, brand color) -->
  <path d="M775,320 L775,360 L630,360 L630,392" fill="none" stroke="#D97757" stroke-width="1.8" marker-end="url(#ab)"/>
  <text x="640" y="352" fill="#D97757" font-size="8" font-weight="600">共享同一内核</text>
  <!-- FastAPI -> textin (upload) -->
  <path d="M150,320 L150,410" fill="none" stroke="#fb923c" stroke-width="1.4" marker-end="url(#ao)"/>
  <text x="143" y="368" fill="#fb923c" font-size="8" text-anchor="end">上传PDF/Word</text>
  <!-- textin -> retriever (parsed text) -->
  <path d="M260,448 L300,448" fill="none" stroke="#fb923c" stroke-width="1.4" marker-end="url(#ao)"/>
  <text x="262" y="440" fill="#fb923c" font-size="8">解析文本</text>
  <!-- textin -> TextIn API -->
  <path d="M157,480 L157,600" fill="none" stroke="#fbbf24" stroke-width="1.4" marker-end="url(#am)"/>
  <text x="165" y="548" fill="#fbbf24" font-size="8">解析请求</text>
  <!-- retriever -> SQLite -->
  <path d="M430,516 L430,605" fill="none" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#av)"/>
  <text x="438" y="560" fill="#a78bfa" font-size="8">读写 chunks</text>
  <!-- retriever -> 硅基流动 -->
  <path d="M630,516 L630,560 L690,560 L690,600" fill="none" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#am)"/>
  <text x="636" y="540" fill="#fbbf24" font-size="8">embed / 精排</text>
  <!-- retriever -> llm -->
  <path d="M760,450 L800,450" fill="none" stroke="#fb923c" stroke-width="1.5" marker-end="url(#ao)"/>
  <text x="762" y="442" fill="#fb923c" font-size="8">命中内容</text>
  <!-- llm -> 硅基流动 -->
  <path d="M890,480 L890,565 L815,565 L815,600" fill="none" stroke="#fbbf24" stroke-width="1.4" marker-end="url(#am)"/>
  <text x="828" y="548" fill="#fbbf24" font-size="8">DeepSeek 生成</text>

  <!-- ===== Boxes (mask + visual) ===== -->
  <!-- 浏览器 -->
  <rect x="120" y="96" width="320" height="62" rx="6" fill="#0f172a"/>
  <rect x="120" y="96" width="320" height="62" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="280" y="122" class="t" font-size="12" text-anchor="middle">浏览器 · 前端交互页</text>
  <text x="280" y="140" class="s" font-size="9" text-anchor="middle">static/index.html｜建库 · 上传 · 流式检索 · 接入引导</text>
  <!-- Agent -->
  <rect x="600" y="96" width="340" height="62" rx="6" fill="#0f172a"/>
  <rect x="600" y="96" width="340" height="62" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="770" y="122" class="t" font-size="12" text-anchor="middle">Agent 宿主</text>
  <text x="770" y="140" class="s" font-size="9" text-anchor="middle">Claude Desktop / Cursor / Claude Code</text>

  <!-- FastAPI -->
  <rect x="110" y="240" width="330" height="80" rx="6" fill="#0f172a"/>
  <rect x="110" y="240" width="330" height="80" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="275" y="265" class="t" font-size="12" text-anchor="middle">FastAPI · app/main.py</text>
  <text x="275" y="283" class="s" font-size="9" text-anchor="middle">知识库 CRUD(分页) · 文档上传(text/file)</text>
  <text x="275" y="299" class="s" font-size="9" text-anchor="middle">/api/search · /api/search/stream (SSE)</text>
  <!-- mcp -->
  <rect x="600" y="240" width="350" height="80" rx="6" fill="#0f172a"/>
  <rect x="600" y="240" width="350" height="80" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="775" y="265" class="t" font-size="12" text-anchor="middle">mcp_server.py · FastMCP / stdio</text>
  <text x="775" y="283" class="s" font-size="9" text-anchor="middle">3 工具：search · list · add_text</text>
  <text x="775" y="299" class="s" font-size="9" text-anchor="middle">错误处理：空query / 库不存在 / 失败 / 超时</text>

  <!-- textin -->
  <rect x="55" y="410" width="205" height="70" rx="6" fill="#0f172a"/>
  <rect x="55" y="410" width="205" height="70" rx="6" fill="rgba(251,146,60,0.18)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="157" y="438" class="t" font-size="11" text-anchor="middle">textin.py</text>
  <text x="157" y="456" class="s" font-size="9" text-anchor="middle">PDF/Word/图片 → 文本</text>

  <!-- retriever kernel (STAR, brand color) -->
  <rect x="300" y="392" width="460" height="124" rx="8" fill="#0f172a"/>
  <rect x="300" y="392" width="460" height="124" rx="8" fill="rgba(217,119,87,0.18)" stroke="#D97757" stroke-width="2"/>
  <text x="530" y="418" class="t" font-size="13" text-anchor="middle">retriever.py · 检索内核（单一真相）</text>
  <line x1="330" y1="428" x2="730" y2="428" stroke="#D97757" stroke-width="0.6" stroke-dasharray="3,3"/>
  <text x="530" y="448" fill="#e2e8f0" font-size="9.5" text-anchor="middle">入库：chunking 分块 → bge-m3 向量化(1024维) → 存 SQLite</text>
  <text x="530" y="470" fill="#e2e8f0" font-size="9.5" text-anchor="middle">检索：cosine 召回 + 阈值 → bge-reranker 精排</text>
  <text x="530" y="490" fill="#e2e8f0" font-size="9.5" text-anchor="middle">　　　 → 文档去重 → 精排相关度下限过滤</text>

  <!-- llm -->
  <rect x="800" y="410" width="200" height="70" rx="6" fill="#0f172a"/>
  <rect x="800" y="410" width="200" height="70" rx="6" fill="rgba(251,146,60,0.18)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="900" y="438" class="t" font-size="11" text-anchor="middle">llm.py</text>
  <text x="900" y="456" class="s" font-size="9" text-anchor="middle">DeepSeek-V3 流式生成</text>

  <!-- TextIn API -->
  <rect x="55" y="600" width="205" height="78" rx="6" fill="#0f172a"/>
  <rect x="55" y="600" width="205" height="78" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="157" y="628" class="t" font-size="11" text-anchor="middle">TextIn API</text>
  <text x="157" y="647" class="s" font-size="8.5" text-anchor="middle">通用文档解析</text>
  <text x="157" y="662" class="s" font-size="8.5" text-anchor="middle">版面分析 · 表格 · OCR</text>

  <!-- SQLite cylinder -->
  <g>
    <rect x="330" y="617" width="190" height="46" fill="#0f172a"/>
    <ellipse cx="425" cy="617" rx="95" ry="12" fill="#0f172a"/>
    <ellipse cx="425" cy="663" rx="95" ry="12" fill="#0f172a"/>
    <rect x="330" y="617" width="190" height="46" fill="rgba(76,29,149,0.4)"/>
    <ellipse cx="425" cy="617" rx="95" ry="12" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="330" y1="617" x2="330" y2="663" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="520" y1="617" x2="520" y2="663" stroke="#a78bfa" stroke-width="1.5"/>
    <ellipse cx="425" cy="663" rx="95" ry="12" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="425" y="636" class="t" font-size="11" text-anchor="middle">SQLite</text>
    <text x="425" y="652" class="s" font-size="8.5" text-anchor="middle">kb / documents / chunks</text>
  </g>

  <!-- 硅基流动 -->
  <rect x="580" y="600" width="300" height="78" rx="6" fill="#0f172a"/>
  <rect x="580" y="600" width="300" height="78" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="730" y="626" class="t" font-size="11" text-anchor="middle">硅基流动 API</text>
  <text x="730" y="645" class="s" font-size="8.5" text-anchor="middle">bge-m3(embedding) · bge-reranker-v2-m3(精排)</text>
  <text x="730" y="661" class="s" font-size="8.5" text-anchor="middle">DeepSeek-V3(流式生成)</text>

  <!-- Legend -->
  <text x="905" y="618" class="s" font-size="8">图例</text>
  <rect x="900" y="624" width="11" height="11" rx="2" fill="rgba(8,51,68,0.4)" stroke="#22d3ee"/><text x="916" y="633" class="s" font-size="8">客户端</text>
  <rect x="900" y="640" width="11" height="11" rx="2" fill="rgba(6,78,59,0.4)" stroke="#34d399"/><text x="916" y="649" class="s" font-size="8">服务入口</text>
  <rect x="900" y="656" width="11" height="11" rx="2" fill="rgba(217,119,87,0.18)" stroke="#D97757"/><text x="916" y="665" class="s" font-size="8">检索内核</text>
</svg>
